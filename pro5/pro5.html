<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <form action="action1.html">
            <fieldset>

                <legend>Employee Details</legend>

                <label for="fname">First name:</label>
                <input id="fname" type="text" required>

                <br><br>

                <label for="lname">Last name:</label>
                <input id="lname" type="text" required>
                
                <br><br>
                
                <label for="gender"></label>

                <input type="radio" id="m" name="gender" required>
                <label for="m">Male</label>

                <input type="radio" id="f" name="gender" required>
                <label for="f">Female</label>

                <br><br>

                <label for="id">Employee ID:</label>
                <input id="id" type="number" required>

                <br><br>

                <label for="desig">Designation:</label>
                <input id="desig" type="text" required>

                <br><br>

                <label for="phone">Phone Number:</label>
                <input id="phone" type="number" required>

                <br><br>

                <input type="submit">

            </fieldset>

        </form>
    </div>
</body>
</html>
